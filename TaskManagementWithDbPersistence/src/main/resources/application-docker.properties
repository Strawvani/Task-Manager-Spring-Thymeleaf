# application-docker.properties
# This profile is activated when SPRING_PROFILES_ACTIVE=docker
# All settings here OVERRIDE application.properties when running in Docker.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Graceful shutdown ? give Spring Boot time to close connections cleanly
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Log to stdout only (containers stream stdout to 'docker logs')
logging.file.name=