<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title th:text="${pageTitle}">Task Form</title>

    <link th:href="@{/css/main.css}" rel="stylesheet">

</head>

<body>

<header th:replace="~{fragments/nav :: navbar}"></header>

<main class="container">
    <h2 th:text="${pageTitle}">New Task</h2>

    <form th:action="${task.id != null} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}" th:object="${task}" method="post">
        <input type="hidden" name="_method" value="PUT">

        <div class="form-group">
            <label for="title">Title</label>
            <input th:type="text" th:field="*{title}"
                   th:classappend="${#fields.hasErrors('title')} ? 'input-error' : ''"
                   placeholder="Enter task title">
            <span id="title-counter"></span>
            <span class="error-text"
                  th:if="${#fields.hasErrors('title')}"
                  th:errors="*{title}">Error</span>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea th:field="*{description}" rows="3"
                      th:classappend="${#fields.hasErrors('description')} ? 'input-error' : ''"
            ></textarea>
            <span id="char-count"></span>
            <span class="error-text"
                  th:if="${#fields.hasErrors('description')}"
                  th:errors="*{description}">Error</span>
        </div>

        <div class="form-group">
            <label for="priority">Priority</label>
            <select th:field="*{priority}">
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
            </select>
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select th:field="*{status}">
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
            </select>
        </div>


        <button type="submit" class="btn btn-primary">Save Task</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
        <a th:href="@{/tasks}" class="btn btn-secondary">Cancel</a>

    </form>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script th:src="@{/js/main.js}" defer></script>
</body>

</html>
