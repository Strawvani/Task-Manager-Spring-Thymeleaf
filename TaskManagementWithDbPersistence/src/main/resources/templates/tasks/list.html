<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Task List</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>

<body>

<header th:replace="~{fragments/nav :: navbar}"></header>

<main class="container">

    <h2 class="page-title" th:text="${pageTitle}">Tasks List</h2>

    <input type="text" id="task-search" placeholder="Search tasks...">

    <div class="task-grid">
        <div class="task-card" th:each="task : ${tasks}"
             th:classappend="${task.status.name() == 'DONE'} ? 'done' : ''">
            <h3 class="task-title" th:text="${task.title}">Title</h3>
            <div class="badge-container">
                 <span class="badge"
                       th:classappend="${task.status.name() == 'DONE'} ? 'badge-done' :
                     (${task.status.name() == 'IN_PROGRESS'} ? 'badge-progress' : 'badge-todo')"
                       th:text="${task.status.displayName}">
            </span>
                <span class="priority-badge"
                      th:classappend="${task.priority.name() == 'LOW'} ? 'badge-low' :
                     (${task.priority.name() == 'MEDIUM'} ? 'badge-medium' : 'badge-high')"
                      th:text="${task.priority.displayName}">
            </span>
            </div>
            <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-secondary">View</a>
            <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-secondary">Edit</a>
            <button class="btn btn-complete"
                    th:attr="data-task-id=${task.id}"
                    th:unless="${task.status.name() == 'DONE'}">
                Mark Complete
            </button>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/main.js}" defer></script>

</body>
</html>
